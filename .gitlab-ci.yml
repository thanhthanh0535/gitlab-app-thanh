workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

variables:
    NETLIFY_SITE_ID: 'a9ec3eec-064d-4c2d-b4b2-b82b77f8fae2'

stages:
  - build
  - test
  - deploy_review
  - deploy_staging
  - deploy_prod

build_website:
  image: node:22-alpine
  stage: build
  script:
    - node --version
    - npm --version
    #- ls -la #list cmt
    - npm ci # same "npm install" but npm ci faster n using package json
    - npm run build
  artifacts:
    paths:
      - build/

