stages:
  - build
  - test

build_website:
  image: node:22-alpine
  stage: build
  script:
    - node --version
    - npm --version
    #- ls -la #list cmt
    - npm ci # same "npm install" but npm ci faster n using package json
    - npm run build 
    #- ls -la
  artifacts:
    paths:
      - build/

build_website:
  image: alpine
  stage: build
  script:
    - mkdir build
    - echo "<h1>Learn Gitlab<h1>" > build/index.html
  artifacts:
    paths:
      - build/

.test_artifacts:
  image: alpine
  stage: test
  script:
    - test -f build/index.html

.unit_tests:
  image: node:22-alpine
  stage: test
  script:
    - npm ci
    - npm test
  artifacts:
    reports:
      junit: reports/junit.xml

