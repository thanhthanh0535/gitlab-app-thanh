#   artifacts:
#     paths:
#       - build/

.test_artifacts:
  image: alpine
  stage: test
  script:
    - test -f build/index.html

.unit_tests:
  image: node:22-alpine
  stage: test
  script:
    - npm ci
    - npm test
  artifacts:
    reports:
      junit: reports/junit.xml

